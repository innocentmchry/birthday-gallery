<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Confetti canvas (always on top) -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Floating background decorations -->
  <div class="deco-layer" aria-hidden="true">
    <span class="balloon" style="left:3%;  animation-duration:14s; animation-delay:0s;">🎈</span>
    <span class="balloon" style="left:17%; animation-duration:17s; animation-delay:-6s;  font-size:30px;">🎈</span>
    <span class="balloon" style="right:8%; animation-duration:12s; animation-delay:-9s;">🎈</span>
    <span class="balloon" style="right:24%;animation-duration:19s; animation-delay:-3s;  font-size:26px;">🎈</span>
    <span class="balloon" style="left:44%; animation-duration:15s; animation-delay:-11s; font-size:22px;">🎈</span>
    <span class="star-deco" style="top:10%; left:7%;">⭐</span>
    <span class="star-deco" style="top:22%; right:5%; animation-delay:0.9s;">✨</span>
    <span class="star-deco" style="top:55%; left:4%; animation-delay:1.7s;">⭐</span>
    <span class="star-deco" style="top:68%; right:8%; animation-delay:1.3s;">✨</span>
    <span class="star-deco" style="top:38%; left:92%; animation-delay:2.2s; font-size:16px;">🎉</span>
  </div>

  <!-- ─── HEADER ─── -->
  <header class="site-header">
    <div class="header-brand">
      <span>🎂</span>
      <span class="brand-name">Birthday</span>
    </div>
    <button class="music-btn" id="musicBtn" title="Play Birthday Music" aria-label="Toggle music">
      <div class="music-bars">
        <span></span><span></span><span></span>
      </div>
    </button>
  </header>

  <!-- ─── HERO ─── -->
  <section class="hero">
    <p class="hero-eyebrow">✨ &nbsp; A Special Celebration &nbsp; ✨</p>
    <h1 class="hero-title">
      <span class="hero-happy">Happy</span>
      <span class="hero-bday">Birthday!</span>
    </h1>
    <p class="hero-desc" id="heroDesc">
      Scroll through cherished memories — click any photo to reveal a birthday message
    </p>
    <div class="drag-hint">
      <span class="hint-arrow">←</span>
      <span>Drag to Explore</span>
      <span class="hint-dot">·</span>
      <span>Click to Open</span>
      <span class="hint-arrow">→</span>
    </div>
  </section>

  <!-- ─── GALLERY ─── -->
  <div class="gallery-wrap" id="galleryWrap">
    <div class="gallery-track" id="galleryTrack">
      <!-- Cards inserted by JS -->
    </div>
  </div>

  <div class="section-fade"></div>

  <!-- ─── MODAL ─── -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-hidden="true">

    <button class="modal-close-btn" id="modalClose" aria-label="Close">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <div class="modal-inner" id="modalInner">

      <!-- Left: Photo -->
      <div class="modal-photo-col">
        <div class="modal-frame">
          <div class="modal-photo-ph" id="modalPh"><span>🎂</span></div>
          <img class="modal-photo-img" id="modalImg" src="" alt="Birthday photo" />
        </div>
      </div>

      <!-- Right: Message -->
      <div class="modal-msg-col">
        <div class="msg-badge">🎉 Birthday Message</div>
        <div class="msg-counter">
          <span class="msg-num" id="msgNum">01</span>
          <span class="msg-sep">/</span>
          <span class="msg-total" id="msgTotal">10</span>
        </div>
        <div class="msg-body">
          <p class="msg-text" id="msgText"></p><span class="msg-cursor" id="msgCursor">|</span>
        </div>
        <div class="msg-hearts" id="msgHearts">💝 &nbsp; 💛 &nbsp; 💝</div>
      </div>

    </div><!-- /modal-inner -->

    <!-- Navigation -->
    <div class="modal-nav">
      <button class="modal-nav-btn" id="prevBtn" aria-label="Previous photo">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
      <button class="modal-nav-btn" id="nextBtn" aria-label="Next photo">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" fill="none">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
    </div>

  </div><!-- /modal -->

  <script src="js/main.js"></script>
</body>
</html>
